<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Focus Mode In Beta!</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">

<style>

:root{
  --blue:#4cc9ff;
  --purple:#9b5cff;
  --bg:#050014;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  min-height:100vh;
  font-family:'Orbitron',sans-serif;
  color:white;

  background:
    linear-gradient(90deg, rgba(76,201,255,.10) 1px, transparent 1px),
    linear-gradient(rgba(155,92,255,.10) 1px, transparent 1px),
    var(--bg);

  background-size:80px 80px;
}

/* ===== LAYOUT ===== */

.app{
  display:grid;
  grid-template-columns:80px 1fr 220px;
  gap:20px;
  padding:20px;
}

/* ===== LEVEL ===== */

.level{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
}

.level-bar{
  height:280px;
  width:14px;
  background:#0b0b18;
  border-radius:20px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.08);
}

.level-fill{
  width:100%;
  height:10%;
  background:linear-gradient(var(--blue),var(--purple));
  box-shadow:0 0 18px rgba(76,201,255,.5);
  transition:height .6s ease;
}

.level-text{
  font-size:12px;
  text-align:center;
  opacity:.8;
}

/* ===== MAIN ===== */

.main{
  text-align:center;
}

.title{
  font-size:clamp(2.6rem,6vw,5rem);
  letter-spacing:.28em;
  color:var(--blue);
  text-shadow:0 0 25px rgba(76,201,255,.6);
}

/* ===== TARGET DATE ===== */

.target{
  margin-top:10px;
  margin-bottom:18px;
}

.target input{
  margin-top:8px;
  padding:10px 14px;
  border:none;
  border-radius:20px;
  background:#0f172a;
  color:white;
  font-family:'Orbitron',sans-serif;
}

/* ===== TIMER ===== */

.timer{
  display:flex;
  justify-content:center;
  gap:14px;
  flex-wrap:wrap;
  margin:24px 0;
}

.box{
  padding:14px 22px;
  border-radius:22px;
  border:1px solid rgba(155,92,255,.5);
  background:rgba(255,255,255,.02);
  box-shadow:0 0 14px rgba(155,92,255,.25);
  min-width:90px;
}

/* ===== QUOTE ===== */

.quote{
  margin:16px 0;
  opacity:.85;
  transition:.3s;
}

/* ===== SEARCH ===== */

.search input{
  width:min(90vw,360px);
  padding:14px;
  border-radius:30px;
  border:none;
  outline:none;
  background:#0f172a;
  color:white;
  font-size:16px;
  font-family:'Orbitron',sans-serif;
}

/* ===== BUTTONS ===== */

.buttons{
  margin:22px 0;
  display:flex;
  justify-content:center;
  gap:16px;
  flex-wrap:wrap;
}

.btn{
  padding:12px 24px;
  border-radius:30px;
  border:1px solid var(--blue);
  background:transparent;
  color:white;
  cursor:pointer;
  font-family:'Orbitron',sans-serif;
  transition:.25s;
  text-decoration:none;
}

.btn:hover{
  transform:translateY(-2px);
  box-shadow:0 0 14px rgba(76,201,255,.4);
}

/* ===== STREAK ===== */

.streak-box{
  margin-top:34px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:24px;
}

.streak{
  font-size:18px;
  opacity:.95;
}

/* ===== POMODORO ===== */

.pomo-advanced{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:18px;
}

.ring-wrap{
  position:relative;
  width:190px;
  height:190px;
}

.ring{
  transform:rotate(-90deg);
}

.ring-bg{
  fill:none;
  stroke:#111827;
  stroke-width:12;
}

.ring-progress{
  fill:none;
  stroke:var(--blue);
  stroke-width:12;
  stroke-linecap:round;
  stroke-dasharray:465;
  stroke-dashoffset:465;
  transition:stroke-dashoffset 1s linear;
  filter:drop-shadow(0 0 10px rgba(76,201,255,.6));
}

.ring-center{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

#pomoTime{
  font-size:2rem;
  font-weight:800;
  color:var(--blue);
}

#pomoStatus{
  opacity:.7;
  margin-top:4px;
}

.custom-time{
  display:flex;
  align-items:center;
  gap:10px;
}

.custom-time input{
  width:90px;
  padding:10px;
  border:none;
  border-radius:14px;
  background:#0f172a;
  color:white;
  text-align:center;
  font-family:'Orbitron',sans-serif;
}

.pomo-buttons{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  justify-content:center;
}

/* ===== RIGHT SIDE ===== */

.right{
  display:flex;
  flex-direction:column;
  gap:18px;
}

audio{
  width:100%;
}

/* ===== FOOTER ===== */

footer{
  text-align:center;
  padding:20px;
  opacity:.5;
  font-size:12px;
}

/* ===== MOBILE ===== */

@media(max-width:900px){

  .app{
    grid-template-columns:1fr;
  }

  .level{
    flex-direction:row;
    justify-content:center;
  }

  .level-bar{
    width:220px;
    height:12px;
  }

  .level-fill{
    height:100%;
    width:20%;
  }

}

</style>
</head>

<body>

<div class="app">

  <!-- LEVEL -->

  <div class="level">

    <div class="level-bar">
      <div class="level-fill" id="levelFill"></div>
    </div>

    <div class="level-text" id="levelText">
      Lv 1 · Newbie
    </div>

  </div>

  <!-- MAIN -->

  <div class="main">

    <div class="title">FOCUS MODE</div>

    <!-- TARGET -->

    <div class="target">
      <small>Set your target date</small><br>

      <input type="date" id="datePicker">
    </div>

    <!-- COUNTDOWN -->

    <div class="timer">

      <div class="box" id="days">0D</div>
      <div class="box" id="hours">0H</div>
      <div class="box" id="mins">0M</div>
      <div class="box" id="secs">0S</div>

    </div>

    <!-- QUOTES -->

    <div class="quote" id="quote">
      No zero days.
    </div>

    <!-- SEARCH -->

    <form class="search"
      action="https://www.google.com/search"
      method="get"
      target="_blank">

      <input
        type="text"
        name="q"
        placeholder="Search Google..."
      >

    </form>

    <!-- BUTTONS -->

    <div class="buttons">

      <a class="btn"
         href="https://youtube.com"
         target="_blank">

         YouTube
      </a>

      <a class="btn"
         href="https://open.spotify.com"
         target="_blank">

         Spotify
      </a>

    </div>

    <!-- STREAK + POMODORO -->

    <div class="streak-box">

      <div class="streak">
        🔥 Streak:
        <span id="streakEl">3</span>
        days
      </div>

      <!-- POMODORO -->

      <div class="pomo-advanced">

        <div class="ring-wrap">

          <svg class="ring" width="190" height="190">

            <circle
              class="ring-bg"
              cx="95"
              cy="95"
              r="74">
            </circle>

            <circle
              class="ring-progress"
              cx="95"
              cy="95"
              r="74"
              id="ringProgress">
            </circle>

          </svg>

          <div class="ring-center">

            <div id="pomoTime">25:00</div>

            <small id="pomoStatus">
              Focus
            </small>

          </div>

        </div>

        <!-- CUSTOM TIME -->

        <div class="custom-time">

          <input
            type="number"
            id="customMinutes"
            value="25"
            min="1"
          >

          <span>minutes</span>

        </div>

        <!-- CONTROLS -->

        <div class="pomo-buttons">

          <button class="btn"
            onclick="startPomodoro()">

            Start
          </button>

          <button class="btn"
            onclick="pausePomodoro()">

            Pause
          </button>

          <button class="btn"
            onclick="resetPomodoro()">

            Reset
          </button>

        </div>

      </div>

    </div>

  </div>

  <!-- RIGHT -->

  <div class="right">

    <audio id="bgm" controls>

      <source src="ncs.mp3" type="audio/mpeg">

    </audio>

  </div>

</div>

<footer>
  In Beta Testing · May Have Bugs ~ ZeronStudios
</footer>

<script>

/* ===== TARGET DATE ===== */

let targetDate =
  localStorage.targetDate || "2026-02-23";

datePicker.value = targetDate;

datePicker.onchange = e=>{

  targetDate = e.target.value;

  localStorage.targetDate = targetDate;

  updateTimer();

};

/* ===== COUNTDOWN FIX ===== */

function updateTimer(){

  const now = new Date();

  const target =
    new Date(targetDate + "T00:00:00");

  const diff = target - now;

  if(diff <= 0){

    days.textContent = "0D";
    hours.textContent = "0H";
    mins.textContent = "0M";
    secs.textContent = "0S";

    return;
  }

  const d = Math.floor(diff / 86400000);

  const h =
    Math.floor(diff / 3600000) % 24;

  const m =
    Math.floor(diff / 60000) % 60;

  const s =
    Math.floor(diff / 1000) % 60;

  days.textContent = d + "D";
  hours.textContent = h + "H";
  mins.textContent = m + "M";
  secs.textContent = s + "S";
}

setInterval(updateTimer,1000);

updateTimer();

/* ===== QUOTES ===== */

const quotes = [

  "No zero days.",
  "Discipline beats motivation.",
  "Prove them wrong.",
  "You started for a reason.",
  "Locked in.",
  "Focus creates legends."

];

let qi = 0;

setInterval(()=>{

  quote.style.opacity = 0;

  setTimeout(()=>{

    quote.textContent = quotes[qi];

    quote.style.opacity = 1;

    qi = (qi + 1) % quotes.length;

  },300);

},5000);

/* ===== STREAK + LEVEL ===== */

let streak =
  Number(localStorage.streak) || 3;

document.getElementById("streakEl")
.textContent = streak;

let xp = streak * 12;

let level =
  Math.floor(Math.sqrt(xp / 8)) + 1;

let progress =
  Math.min(
    100,
    ((xp % 100) / 100) * 100
  );

/* MOBILE FIX */

if(window.innerWidth <= 900){

  levelFill.style.width =
    progress + "%";

}else{

  levelFill.style.height =
    progress + "%";

}

levelText.textContent =
  `Lv ${level} · ${
    level < 5
      ? "Newbie"
      : level < 15
      ? "Focused"
      : level < 30
      ? "Elite"
      : "Legend"
  }`;

/* ===== ADVANCED POMODORO ===== */

let pomoInterval;

let totalTime = 25 * 60;

let remainingTime = totalTime;

let isPaused = false;

const radius = 74;

const circumference =
  2 * Math.PI * radius;

ringProgress.style.strokeDasharray =
  circumference;

function updateRing(){

  const progress =
    remainingTime / totalTime;

  ringProgress.style.strokeDashoffset =
    circumference -
    (progress * circumference);

}

function updateDisplay(){

  const mins =
    Math.floor(remainingTime / 60);

  const secs =
    remainingTime % 60;

  pomoTime.textContent =
    `${mins}:${String(secs)
      .padStart(2,"0")}`;

  updateRing();

}

function startPomodoro(){

  clearInterval(pomoInterval);

  if(isPaused){

    isPaused = false;

  }else{

    totalTime =
      Number(customMinutes.value || 25)
      * 60;

    remainingTime = totalTime;

  }

  pomoStatus.textContent = "Focus";

  updateDisplay();

  pomoInterval = setInterval(()=>{

    remainingTime--;

    updateDisplay();

    if(remainingTime <= 0){

      clearInterval(pomoInterval);

      pomoStatus.textContent =
        "Completed ✔";

      remainingTime = 0;

      updateDisplay();

      alert(
        "Pomodoro Session Completed!"
      );

    }

  },1000);

}

function pausePomodoro(){

  clearInterval(pomoInterval);

  isPaused = true;

  pomoStatus.textContent = "Paused";

}

function resetPomodoro(){

  clearInterval(pomoInterval);

  totalTime =
    Number(customMinutes.value || 25)
    * 60;

  remainingTime = totalTime;

  isPaused = false;

  pomoStatus.textContent = "Focus";

  updateDisplay();

}

updateDisplay();

/* ===== AUDIO ===== */

bgm.volume = 0.2;

</script>

</body>
</html>
